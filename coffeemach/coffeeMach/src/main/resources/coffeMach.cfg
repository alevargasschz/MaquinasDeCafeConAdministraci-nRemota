# ============================================================
# coffeMach.cfg - CoffeeMach (entorno local)
#
# Este proceso publica el servant "abastecer" y consume
# servicios del ServidorCentral.
# ============================================================

# Valores originales (comentados):
# CoffeMach.Endpoints = default -h localhost -p 12345
# alarmas = Alarmas:tcp -h 10.147.17.112 -p 12345
# ventas = Ventas:tcp -h 10.147.17.112 -p 12345
# recetas = Recetas:tcp -h 10.147.17.112 -p 12345

# Endpoint local donde escucha CoffeeMach
CoffeMach.Endpoints = default -h localhost -p 12346

# Proxies al ServidorCentral (todo local)
alarmas = Alarmas:tcp -h localhost -p 12345
ventas = Ventas:tcp -h localhost -p 12345
recetas = Recetas:tcp -h localhost -p 12345
