# CmLogistic.cfg — Configuracion Ice para CmLogistics

# --- Proxy al ServidorCentral (ServicioComLogistica) ---
# Identidad Ice: "logistica"  (ver ServidorCentral.java -> adapter.add)
# Puerto: 12345 (ver server.cfg -> Server.Endpoints)

# Poner la IP del pc del servidor central
ServicioCentral.Proxy = logistica:tcp -h 10.147.17.136 -p 12345

# --- Proxy a BodegaCentral (ServicioBodega) ---
# Identidad Ice: "BodegaService"  (ver BodegaCentral.java -> adapter.add)
# Puerto: 10001 (ver bodega.cfg -> BodegaAdapter.Endpoints)

# Poner la IP del pc de la bodega
ServicioBodega.Proxy = BodegaService:tcp -h 10.147.17.136 -p 10001

# --- Proxy a la CoffeeMach (usado por "Resolver con cfg") ---
# Identidad Ice: "abastecer"  (ver CoffeeMach.java -> adapter.add)
# Puerto: 12346 (ajustar segun endpoint real de la maquina)

# Poner la ip del equipo que despliega la maquina de cafe
MaquinaCafe.Proxy = abastecer:tcp -h 10.147.17.136 -p 12346